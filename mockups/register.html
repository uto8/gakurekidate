<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規登録 — 学歴デート</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans JP"', 'sans-serif'],
            serif: ['"Noto Serif JP"', 'serif'],
          },
          colors: {
            gk: {
              base: '#0A0A0A', surface: '#141414', elevated: '#1E1E1E',
              hover: '#1A1A1A', text: '#F0F0F0', sub: '#888888',
              muted: '#555555', border: '#2A2A2A',
              gold: '#C9A84C', 'gold-light': '#E8C87A', 'gold-dark': '#9A7A2E',
              success: '#4CAF7A', warning: '#E0A040', error: '#E05252',
            }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    .mock-nav a { color: #555; font-size: 11px; text-decoration: none; }
    .mock-nav a:hover { color: #C9A84C; }
  </style>
</head>
<body class="bg-gk-base text-gk-text font-sans min-h-screen">

  <div class="mock-nav fixed top-0 left-0 right-0 bg-black/80 backdrop-blur px-3 py-1 flex flex-wrap gap-x-3 gap-y-1 z-50 border-b border-gk-border">
    <a href="landing.html">landing</a><a href="login.html">login</a>
    <span style="color:#C9A84C;font-size:11px">▶ register</span>
    <a href="onboarding.html">onboarding</a><a href="discover.html">discover</a>
    <a href="profile-detail.html">profile-detail</a><a href="likes.html">likes</a>
    <a href="matches.html">matches</a><a href="chat.html">chat</a>
    <a href="my-profile.html">my-profile</a>
  </div>

  <div class="flex min-h-screen flex-col items-center justify-center px-4 pt-10 pb-12">
    <div class="w-full max-w-[480px]">

      <!-- logo -->
      <div class="text-center mb-10">
        <h1 class="font-serif font-light text-gk-gold text-[28px] tracking-[0.12em]">学歴デート</h1>
      </div>

      <!-- form card -->
      <div class="bg-gk-surface rounded-2xl p-6 border border-gk-border">
        <h2 class="font-serif text-[18px] text-gk-text mb-6 tracking-[0.04em]">新規登録</h2>

        <!-- email -->
        <div class="mb-4">
          <label class="block text-gk-sub text-[13px] mb-2">メールアドレス</label>
          <input
            type="email"
            placeholder="your@email.com"
            class="w-full h-[52px] px-4 rounded-lg bg-gk-elevated border border-gk-border text-gk-text text-[15px] outline-none focus:border-gk-gold transition-colors placeholder:text-gk-muted"
          />
        </div>

        <!-- password -->
        <div class="mb-4">
          <label class="block text-gk-sub text-[13px] mb-2">パスワード</label>
          <input
            type="password"
            placeholder="8文字以上"
            class="w-full h-[52px] px-4 rounded-lg bg-gk-elevated border border-gk-border text-gk-text text-[15px] outline-none focus:border-gk-gold transition-colors placeholder:text-gk-muted"
          />
        </div>

        <!-- password confirm (validation error state) -->
        <div class="mb-2">
          <label class="block text-gk-sub text-[13px] mb-2">パスワード（確認）</label>
          <input
            type="password"
            value="mismatch"
            class="w-full h-[52px] px-4 rounded-lg bg-gk-elevated border text-gk-text text-[15px] outline-none"
            style="border-color: #E05252;"
          />
          <p class="text-[12px] mt-1" style="color:#E05252">パスワードが一致しません</p>
        </div>

        <!-- submit -->
        <button
          class="w-full h-[52px] rounded-lg text-gk-base font-medium text-[15px] mt-6 transition-opacity hover:opacity-90"
          style="background: linear-gradient(135deg, #9A7A2E, #C9A84C, #E8C87A);"
        >
          登録する
        </button>
      </div>

      <!-- terms note -->
      <p class="text-center mt-4 text-gk-muted text-[12px] leading-relaxed">
        登録することで<span class="text-gk-sub">利用規約</span>および<span class="text-gk-sub">プライバシーポリシー</span>に<br>同意したものとみなします
      </p>

      <!-- login link -->
      <p class="text-center mt-6 text-gk-sub text-[14px]">
        すでにアカウントをお持ちの方は
        <a href="login.html" class="text-gk-gold hover:text-gk-gold-light transition-colors ml-1">ログイン</a>
      </p>

      <!-- empty form variant -->
      <div class="mt-10 border-t border-gk-border pt-6">
        <p class="text-gk-muted text-[11px] mb-3">↓ 正常状態（空フォーム）</p>
        <div class="bg-gk-surface rounded-2xl p-6 border border-gk-border">
          <h2 class="font-serif text-[18px] text-gk-text mb-6 tracking-[0.04em]">新規登録</h2>
          <div class="space-y-4 mb-6">
            <div>
              <label class="block text-gk-sub text-[13px] mb-2">メールアドレス</label>
              <input type="email" placeholder="your@email.com"
                class="w-full h-[52px] px-4 rounded-lg bg-gk-elevated border border-gk-border text-gk-text text-[15px] outline-none placeholder:text-gk-muted" />
            </div>
            <div>
              <label class="block text-gk-sub text-[13px] mb-2">パスワード</label>
              <input type="password" placeholder="8文字以上"
                class="w-full h-[52px] px-4 rounded-lg bg-gk-elevated border border-gk-border text-gk-text text-[15px] outline-none placeholder:text-gk-muted" />
            </div>
            <div>
              <label class="block text-gk-sub text-[13px] mb-2">パスワード（確認）</label>
              <input type="password" placeholder="もう一度入力"
                class="w-full h-[52px] px-4 rounded-lg bg-gk-elevated border border-gk-border text-gk-text text-[15px] outline-none placeholder:text-gk-muted" />
            </div>
          </div>
          <button class="w-full h-[52px] rounded-lg text-gk-base font-medium text-[15px]"
            style="background: linear-gradient(135deg, #9A7A2E, #C9A84C, #E8C87A);">
            登録する
          </button>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
