<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学歴デート — ランディングページ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans JP"', 'sans-serif'],
            serif: ['"Noto Serif JP"', 'serif'],
          },
          colors: {
            gk: {
              base: '#0A0A0A', surface: '#141414', elevated: '#1E1E1E',
              hover: '#1A1A1A', text: '#F0F0F0', sub: '#888888',
              muted: '#555555', border: '#2A2A2A',
              gold: '#C9A84C', 'gold-light': '#E8C87A', 'gold-dark': '#9A7A2E',
              success: '#4CAF7A', warning: '#E0A040', error: '#E05252',
            }
          },
          letterSpacing: { logo: '0.12em' }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
  <!-- mockup nav -->
  <style>
    .mock-nav a { color: #555; font-size: 11px; text-decoration: none; }
    .mock-nav a:hover { color: #C9A84C; }
  </style>
</head>
<body class="bg-gk-base text-gk-text font-sans min-h-screen flex flex-col">

  <!-- mockup navigation -->
  <div class="mock-nav fixed top-0 left-0 right-0 bg-black/80 backdrop-blur px-3 py-1 flex flex-wrap gap-x-3 gap-y-1 z-50 border-b border-gk-border">
    <span style="color:#C9A84C;font-size:11px">▶ landing</span>
    <a href="login.html">login</a><a href="register.html">register</a>
    <a href="onboarding.html">onboarding</a><a href="discover.html">discover</a>
    <a href="profile-detail.html">profile-detail</a><a href="likes.html">likes</a>
    <a href="matches.html">matches</a><a href="chat.html">chat</a>
    <a href="my-profile.html">my-profile</a>
  </div>

  <!-- hero section -->
  <div class="flex-1 flex flex-col items-center justify-center px-4 pt-16 pb-12">
    <div class="w-full max-w-[480px] flex flex-col items-center">

      <!-- decorative line -->
      <div class="w-16 h-px mb-10" style="background: linear-gradient(90deg, transparent, #C9A84C, transparent);"></div>

      <!-- logo -->
      <h1 class="font-serif font-light text-gk-gold text-[32px] tracking-[0.12em] mb-4">
        学歴デート
      </h1>

      <!-- tagline -->
      <p class="text-gk-sub text-[14px] tracking-[0.04em] mb-2 text-center">
        学歴という共通の文脈で出会う
      </p>
      <p class="text-gk-muted text-[13px] text-center mb-12">
        恋愛・婚活向けマッチングアプリ
      </p>

      <!-- feature pills -->
      <div class="flex flex-col gap-3 w-full mb-12">
        <div class="flex items-center gap-3 px-4 py-3 rounded-xl bg-gk-surface border border-gk-border">
          <span class="text-gk-gold text-[18px]">🎓</span>
          <div>
            <p class="text-gk-text text-[14px] font-medium">学歴でつながる出会い</p>
            <p class="text-gk-muted text-[12px]">大学名・学部を自己紹介の一部として活用</p>
          </div>
        </div>
        <div class="flex items-center gap-3 px-4 py-3 rounded-xl bg-gk-surface border border-gk-border">
          <span class="text-gk-gold text-[18px]">✓</span>
          <div>
            <p class="text-gk-text text-[14px] font-medium">相互いいねでマッチング</p>
            <p class="text-gk-muted text-[12px]">お互いが気になったときだけつながれる</p>
          </div>
        </div>
        <div class="flex items-center gap-3 px-4 py-3 rounded-xl bg-gk-surface border border-gk-border">
          <span class="text-gk-gold text-[18px]">💬</span>
          <div>
            <p class="text-gk-text text-[14px] font-medium">リアルタイムチャット</p>
            <p class="text-gk-muted text-[12px]">マッチングしたらすぐにメッセージ交換</p>
          </div>
        </div>
      </div>

      <!-- CTA: register -->
      <a href="register.html" class="w-full block text-center py-[14px] rounded-lg text-gk-base font-medium text-[15px] mb-4 transition-opacity hover:opacity-90"
         style="background: linear-gradient(135deg, #9A7A2E, #C9A84C, #E8C87A);">
        無料で新規登録
      </a>

      <!-- login link -->
      <a href="login.html" class="text-gk-sub text-[14px] hover:text-gk-gold transition-colors">
        すでにアカウントをお持ちの方は <span class="text-gk-gold">ログイン</span>
      </a>

      <!-- decorative line -->
      <div class="w-16 h-px mt-12" style="background: linear-gradient(90deg, transparent, #C9A84C, transparent);"></div>

      <!-- footer note -->
      <p class="text-gk-muted text-[12px] mt-6 text-center">
        完全無料・Web のみ（レスポンシブ対応）
      </p>
    </div>
  </div>

</html>
