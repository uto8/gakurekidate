<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オンボーディング — 学歴デート</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans JP"', 'sans-serif'],
            serif: ['"Noto Serif JP"', 'serif'],
          },
          colors: {
            gk: {
              base: '#0A0A0A', surface: '#141414', elevated: '#1E1E1E',
              hover: '#1A1A1A', text: '#F0F0F0', sub: '#888888',
              muted: '#555555', border: '#2A2A2A',
              gold: '#C9A84C', 'gold-light': '#E8C87A', 'gold-dark': '#9A7A2E',
              success: '#4CAF7A', warning: '#E0A040', error: '#E05252',
            }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    .mock-nav a { color: #555; font-size: 11px; text-decoration: none; }
    .mock-nav a:hover { color: #C9A84C; }
  </style>
</head>
<body class="bg-gk-base text-gk-text font-sans">

  <div class="mock-nav fixed top-0 left-0 right-0 bg-black/80 backdrop-blur px-3 py-1 flex flex-wrap gap-x-3 gap-y-1 z-50 border-b border-gk-border">
    <a href="landing.html">landing</a><a href="login.html">login</a><a href="register.html">register</a>
    <span style="color:#C9A84C;font-size:11px">▶ onboarding</span>
    <a href="discover.html">discover</a><a href="profile-detail.html">profile-detail</a>
    <a href="likes.html">likes</a><a href="matches.html">matches</a>
    <a href="chat.html">chat</a><a href="my-profile.html">my-profile</a>
  </div>

  <!-- ===== STEP 1 ===== -->
  <div class="min-h-screen flex flex-col items-center pt-10 pb-12 px-4">
    <div class="w-full max-w-[480px]">
      <p class="text-gk-muted text-[11px] mb-2 text-center">Step 1 / 3</p>

      <!-- progress bar -->
      <div class="w-full h-1 bg-gk-border rounded-full mb-8 overflow-hidden">
        <div class="h-full rounded-full" style="width:33.3%; background: linear-gradient(90deg, #9A7A2E, #C9A84C);"></div>
      </div>

      <div class="text-center mb-8">
        <h2 class="font-serif text-[22px] tracking-[0.04em] mb-2">基本情報</h2>
        <p class="text-gk-sub text-[14px]">あなたのことを教えてください</p>
      </div>

      <div class="bg-gk-surface rounded-2xl p-6 border border-gk-border space-y-5">
        <!-- name -->
        <div>
          <label class="block text-gk-sub text-[13px] mb-2">
            名前 <span class="text-gk-gold text-[11px]">必須</span>
          </label>
          <input type="text" value="田中 優花"
            class="w-full h-[52px] px-4 rounded-lg bg-gk-elevated border border-gk-gold text-gk-text text-[15px] outline-none" />
        </div>

        <!-- birthday -->
        <div>
          <label class="block text-gk-sub text-[13px] mb-2">
            生年月日 <span class="text-gk-gold text-[11px]">必須</span>
          </label>
          <input type="date" value="2000-03-15"
            class="w-full h-[52px] px-4 rounded-lg bg-gk-elevated border border-gk-border text-gk-text text-[15px] outline-none focus:border-gk-gold" />
          <p class="text-gk-muted text-[12px] mt-1">※ 18歳未満は登録できません</p>
        </div>

        <!-- gender -->
        <div>
          <label class="block text-gk-sub text-[13px] mb-3">
            性別 <span class="text-gk-gold text-[11px]">必須</span>
          </label>
          <div class="grid grid-cols-2 gap-3">
            <button class="h-[52px] rounded-lg border text-[15px] font-medium transition-colors"
              style="border-color:#C9A84C; color:#C9A84C; background:rgba(201,168,76,0.08);">
              女性
            </button>
            <button class="h-[52px] rounded-lg border border-gk-border text-gk-sub text-[15px] hover:border-gk-gold hover:text-gk-gold transition-colors">
              男性
            </button>
          </div>
        </div>
      </div>

      <button class="w-full h-[52px] rounded-lg text-gk-base font-medium text-[15px] mt-6"
        style="background: linear-gradient(135deg, #9A7A2E, #C9A84C, #E8C87A);">
        次へ →
      </button>
    </div>
  </div>

  <div class="border-t border-gk-border/40 my-4"></div>

  <!-- ===== STEP 2 ===== -->
  <div class="flex flex-col items-center pb-12 px-4">
    <div class="w-full max-w-[480px]">
      <p class="text-gk-muted text-[11px] mb-2 text-center">Step 2 / 3</p>

      <div class="w-full h-1 bg-gk-border rounded-full mb-8 overflow-hidden">
        <div class="h-full rounded-full" style="width:66.6%; background: linear-gradient(90deg, #9A7A2E, #C9A84C);"></div>
      </div>

      <div class="text-center mb-8">
        <h2 class="font-serif text-[22px] tracking-[0.04em] mb-2">自己紹介・写真</h2>
        <p class="text-gk-sub text-[14px]">任意項目です（後から編集できます）</p>
      </div>

      <div class="bg-gk-surface rounded-2xl p-6 border border-gk-border space-y-5">
        <!-- photo upload -->
        <div>
          <label class="block text-gk-sub text-[13px] mb-3">
            プロフィール写真 <span class="text-gk-muted text-[11px]">任意</span>
          </label>
          <div class="flex items-center gap-4">
            <div class="w-20 h-20 rounded-full bg-gk-elevated border border-gk-border flex items-center justify-center flex-shrink-0">
              <svg class="w-8 h-8 text-gk-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            </div>
            <button class="flex-1 h-[44px] rounded-lg border border-gk-border text-gk-sub text-[14px] hover:border-gk-gold hover:text-gk-gold transition-colors">
              写真を選ぶ
            </button>
          </div>
        </div>

        <!-- bio -->
        <div>
          <label class="block text-gk-sub text-[13px] mb-2">
            自己紹介 <span class="text-gk-muted text-[11px]">任意</span>
          </label>
          <textarea rows="4"
            class="w-full px-4 py-3 rounded-lg bg-gk-elevated border border-gk-border text-gk-text text-[15px] leading-relaxed outline-none focus:border-gk-gold resize-none placeholder:text-gk-muted"
            placeholder="趣味や好きなことなど、自由に書いてください">読書と映画鑑賞が好きです。週末は友人とカフェ巡りをしています。ゆくゆくは一緒に旅行できる仲になれれば嬉しいです。</textarea>
          <p class="text-gk-muted text-[12px] mt-1 text-right">53 / 200文字</p>
        </div>
      </div>

      <div class="flex gap-3 mt-6">
        <button class="flex-1 h-[52px] rounded-lg border border-gk-border text-gk-sub text-[15px] hover:border-gk-gold hover:text-gk-gold transition-colors">
          スキップ
        </button>
        <button class="flex-[2] h-[52px] rounded-lg text-gk-base font-medium text-[15px]"
          style="background: linear-gradient(135deg, #9A7A2E, #C9A84C, #E8C87A);">
          次へ →
        </button>
      </div>
    </div>
  </div>

  <div class="border-t border-gk-border/40 my-4"></div>

  <!-- ===== STEP 3 ===== -->
  <div class="flex flex-col items-center pb-16 px-4">
    <div class="w-full max-w-[480px]">
      <p class="text-gk-muted text-[11px] mb-2 text-center">Step 3 / 3</p>

      <div class="w-full h-1 bg-gk-border rounded-full mb-8 overflow-hidden">
        <div class="h-full rounded-full" style="width:100%; background: linear-gradient(90deg, #9A7A2E, #C9A84C, #E8C87A);"></div>
      </div>

      <div class="text-center mb-8">
        <h2 class="font-serif text-[22px] tracking-[0.04em] mb-2">学歴</h2>
        <p class="text-gk-sub text-[14px]">学歴を登録するとすぐに探索が始まります</p>
      </div>

      <div class="bg-gk-surface rounded-2xl p-6 border border-gk-border space-y-5">
        <div>
          <label class="block text-gk-sub text-[13px] mb-2">
            大学名 <span class="text-gk-gold text-[11px]">必須</span>
          </label>
          <input type="text" value="東京大学"
            class="w-full h-[52px] px-4 rounded-lg bg-gk-elevated border border-gk-border text-gk-text text-[15px] outline-none focus:border-gk-gold" />
        </div>

        <div>
          <label class="block text-gk-sub text-[13px] mb-2">
            学部名 <span class="text-gk-gold text-[11px]">必須</span>
          </label>
          <input type="text" value="文学部"
            class="w-full h-[52px] px-4 rounded-lg bg-gk-elevated border border-gk-border text-gk-text text-[15px] outline-none focus:border-gk-gold" />
        </div>

        <div>
          <label class="block text-gk-sub text-[13px] mb-2">
            卒業年度 <span class="text-gk-gold text-[11px]">必須</span>
          </label>
          <input type="number" value="2024" min="1950" max="2100"
            class="w-full h-[52px] px-4 rounded-lg bg-gk-elevated border border-gk-border text-gk-text text-[15px] outline-none focus:border-gk-gold" />
        </div>
      </div>

      <!-- gold decorative highlight -->
      <div class="mt-4 px-4 py-3 rounded-lg flex items-center gap-2" style="background:rgba(201,168,76,0.08); border:1px solid rgba(201,168,76,0.2)">
        <span class="text-gk-gold text-[16px]">🎓</span>
        <p class="text-gk-gold text-[13px]">学歴を登録すると探索画面に進めます</p>
      </div>

      <button class="w-full h-[52px] rounded-lg text-gk-base font-medium text-[15px] mt-6"
        style="background: linear-gradient(135deg, #9A7A2E, #C9A84C, #E8C87A);">
        完了して探索を始める 🎉
      </button>
    </div>
  </div>

</body>
</html>
